<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>P10 Landing Page</title>
</head>

<body>
  <div class="preloader">
    <div class="intro-title">
      <h1>Nullspace Studio</h1>
    </div>
    <div class="outro-title">
      <h1>10</h1>
    </div>
  </div>

  <div class="split-overlay">
    <div class="preloader">
      <div class="intro-title">
        <h1>Nullspace Studio</h1>
      </div>
      <div class="outro-title">
        <h1>10</h1>
      </div>
    </div>
  </div>

  <div class="tags-overlay">
    <div class="tag tag-1">
      <p>Negative space</p>
    </div>
    <div class="tag tag-2">
      <p>Form & Void</p>
    </div>
    <div class="tag tag-3">
      <p>Light Studies</p>
    </div>
  </div>

  <div class="container">
    <nav>
      <p id="logo">N10</p>
      <p>Menu</p>
    </nav>

    <!-- <div class="hero-img"><img src="./assets/video2.jpg" alt=""></div> -->
    <div class="hero-img">
      <video autoplay muted loop playsinline>
        <source src="/assets/video4.mp4" type="video/mp4">
      </video>
    </div>

    <div class="card">
      <h1>Nullspace</h1>
    </div>

    <footer class="footer">
      <p>Scroll Down</p>
      <p>Made by Maks Solomon</p>
    </footer>
  </div>




  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/CustomEase.min.js"></script>

  <script src="./script.js"></script>
</body>

</html>
